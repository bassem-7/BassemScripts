<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bassem Scripts</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.hero{
    padding:40px 20px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:20px;
    object-fit:cover;
    box-shadow:0 0 20px rgba(0,255,136,.3);
}

h1{
    margin-top:15px;
    font-size:55px;
}

.subtitle{
    color:#aaa;
    margin-top:10px;
}

.search-container{
    width:600px;
    max-width:90%;
    margin:25px auto;
    position:relative;
}

#searchInput{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e1e1e;
    color:white;
    font-size:16px;
}

#results{
    background:#1a1a1a;
    border-radius:12px;
    margin-top:8px;
    overflow:hidden;
}

.result{
    padding:15px;
    cursor:pointer;
    border-bottom:1px solid #333;
}

.result:hover{
    background:#2a2a2a;
}

.maps-title{
    margin-top:40px;
    margin-bottom:20px;
}

.maps-grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    padding:20px;
}

.map{
    width:320px;
    background:#1a1a1a;
    border-radius:16px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 0 15px rgba(0,0,0,.4);
}

.map:hover{
    transform:translateY(-8px);
}

.map-image{
    width:100%;
    height:190px;
    object-fit:cover;
}

.map h3{
    margin:15px 0;
}

button{
    background:#00ff88;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

footer{
    margin-top:50px;
    padding:25px;
    color:#888;
    border-top:1px solid #222;
}

</style>
</head>

<body>

<div class="hero">

    <img src="logo.png" class="logo">

    <h1>Bassem Scripts</h1>

    <p class="subtitle">
        مكتبة مابات وصفحات منظمة
    </p>

</div>

<div class="search-container">

<input
type="text"
id="searchInput"
placeholder="🔍 ابحث عن ماب..."
onkeyup="searchMaps()">

<div id="results"></div>

</div>

<h2 class="maps-title">🎮 المابات</h2>

<div class="maps-grid">

    <div class="map">

        <img src="garden.png" class="map-image">

        <h3>🌱 Grow a Garden 2</h3>

        <a href="garden.html">
            <button>دخول الصفحة</button>
        </a>

    </div>

    <div class="map">

        <img src="animalhospital.png" class="map-image">

        <h3>🐶 Animal Hospital</h3>

        <a href="animalhospital.html">
            <button>دخول الصفحة</button>
        </a>

    </div>

</div>

<footer>
    © 2026 Bassem Scripts - جميع الحقوق محفوظة
</footer>

<script>

const maps = [

{
name:"Grow a Garden 2",
page:"garden.html"
},

{
name:"Animal Hospital",
page:"animalhospital.html"
}

];

function searchMaps(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let results =
document.getElementById("results");

results.innerHTML = "";

if(input === ""){
return;
}

maps.forEach(map=>{

if(map.name.toLowerCase().includes(input)){

results.innerHTML += `
<div class="result"
onclick="window.location.href='${map.page}'">
🎮 ${map.name}
</div>
`;

}

});

}

</script>

</body>
</html>
